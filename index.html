<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI Chatbot</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial, sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; }
    .chat-container { width: 420px; height: 600px; background: white; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); display: flex; flex-direction: column; overflow: hidden; }
    .chat-header { background: #1F4E79; color: white; padding: 16px 20px; font-size: 18px; font-weight: bold; }
    .chat-header span { font-size: 13px; font-weight: normal; opacity: 0.8; display: block; }
    .chat-messages { flex: 1; padding: 16px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
    .message { max-width: 80%; padding: 10px 14px; border-radius: 12px; font-size: 14px; line-height: 1.5; }
    .message.user { background: #1F4E79; color: white; align-self: flex-end; border-bottom-right-radius: 4px; }
    .message.bot { background: #f0f2f5; color: #333; align-self: flex-start; border-bottom-left-radius: 4px; }
    .message.loading { opacity: 0.6; font-style: italic; }
    .chat-input { display: flex; padding: 12px; border-top: 1px solid #eee; gap: 8px; }
    .chat-input input { flex: 1; padding: 10px 14px; border: 1px solid #ddd; border-radius: 24px; outline: none; font-size: 14px; }
    .chat-input input:focus { border-color: #1F4E79; }
    .chat-input button { background: #1F4E79; color: white; border: none; border-radius: 24px; padding: 10px 18px; cursor: pointer; font-size: 14px; }
    .chat-input button:hover { background: #163d61; }
    .chat-input button:disabled { opacity: 0.5; cursor: not-allowed; }
  </style>
</head>
<body>
  <div class="chat-container">
    <div class="chat-header">
      AI Assistant
      <span>Ask me anything about your documents</span>
    </div>
    <div class="chat-messages" id="messages">
      <div class="message bot">Hello! Upload a document and ask me anything about it.</div>
    </div>
    <div class="chat-input">
      <input type="text" id="userInput" placeholder="Type your message..." />
      <button id="sendBtn" onclick="sendMessage()">Send</button>
    </div>
  </div>

  <script>
    const messagesDiv = document.getElementById('messages');
    const input = document.getElementById('userInput');
    const btn = document.getElementById('sendBtn');

    input.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') sendMessage();
    });

    async function sendMessage() {
      const message = input.value.trim();
      if (!message) return;

      addMessage(message, 'user');
      input.value = '';
      btn.disabled = true;

      const loading = addMessage('Thinking...', 'bot loading');

      try {
        const res = await fetch('http://localhost:3000/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message })
        });
        const data = await res.json();
        loading.remove();
        addMessage(data.reply || data.error, 'bot');
      } catch (err) {
        loading.remove();
        addMessage('Something went wrong. Please try again.', 'bot');
      }

      btn.disabled = false;
    }

    function addMessage(text, className) {
      const div = document.createElement('div');
      div.className = `message ${className}`;
      div.textContent = text;
      messagesDiv.appendChild(div);
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
      return div;
    }
  </script>
</body>
</html>
